<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calmora</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-container">
        <!-- Dashboard & Disclaimer Header -->
        <div class="header">
            <h2>Calmora 🌱</h2>
            <div class="disclaimer">
                <strong>Disclaimer:</strong> I am Calmora, an AI chatbot built by students, for students. I am <em>not</em> a medical professional, therapist, or diagnostic tool. 
                If you are in crisis, please seek immediate professional help.
            </div>
        </div>

        <!-- Scrollable Chat History window -->
        <div class="chat-box" id="chat-box">
            <div class="message bot-message">
                Hi! I'm here to listen. Taking a break from studying? How are you feeling today?
            </div>
        </div>

        <!-- User text input area -->
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <!-- Integrate Frontend logic -->
    <script src="/static/script.js"></script>
</body>
</html>
